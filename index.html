<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imgs/gtavi.ico" type="image/x-icon">
    <title>Regressiva GTA VI</title>
</head>
<body>
    <header class="countdown-header">
        <div class="countdown-container">
            <p class="countdown-label">Faltam</p>
            <div class="countdown-values">
                <div class="countdown-item">
                    <span id="dias">0</span>
                    <span class="countdown-unit">dias</span>
                </div>
                <div class="countdown-item">
                    <span id="horas">0</span>
                    <span class="countdown-unit">horas</span>
                </div>
                <div class="countdown-item">
                    <span id="minutos">0</span>
                    <span class="countdown-unit">minutos</span>
                </div>
                <div class="countdown-item">
                    <span id="segundos">0</span>
                    <span class="countdown-unit">segundos</span>
                </div>
            </div>
        </div>
    </header>

    <script>
        function regressiva() {
            const dataLancamento = new Date(2026, 10, 19)
            const dataAtual = new Date()
            const diferencaMilesegundos = dataLancamento - dataAtual

            const dias = Math.floor(diferencaMilesegundos / (1000 * 60 * 60 * 24))
            const horas = Math.floor((diferencaMilesegundos / (1000 * 60 * 60)) % 24)
            const minutos = Math.floor((diferencaMilesegundos / (1000 * 60)) % 60)
            const segundos = Math.floor((diferencaMilesegundos / 1000) % 60)

            document.getElementById('dias').textContent = dias
            document.getElementById('horas').textContent = horas
            document.getElementById('minutos').textContent = minutos
            document.getElementById('segundos').textContent = segundos
        }

        setInterval(regressiva, 1000)
    </script>
</body>
</html>
